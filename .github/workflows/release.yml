name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: |
          npx electron-builder --linux deb tar.gz AppImage --x64
          tar -C release/linux-unpacked -czf release/AgentVault-linux-amd64.tar.gz .

      - name: Package Windows
        if: matrix.platform == 'win'
        run: npx electron-builder --win nsis portable --x64

      - name: Package macOS
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac dmg zip --x64 --arm64
        continue-on-error: true

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/*.deb
            release/*.AppImage
            release/*.tar.gz
            release/*.exe
            release/*.dmg
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
